  <!-- Prevent theme flash: apply dark class before first paint -->
  <script>
    (function () {
      var s = localStorage.getItem('darkMode');
      var d = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (s === 'true' || (s === null && d)) document.documentElement.classList.add('dark');
    })();
  </script>

<body>
  <noscript>
    <div style="padding:2rem;text-align:center;font-family:sans-serif">
      <h1>JavaScript Required</h1>
      <p>Please enable JavaScript to use GMR & Associates.</p>
    </div>
  </noscript>
  <div id="root">
    <!-- Skip to main content link for accessibility — hidden until React mounts -->
    <a href="#main-content" class="sr-only focus:not-sr-only focus:fixed focus:top-4 focus:left-4 focus:z-[99999] focus:px-4 focus:py-2 focus:bg-foreground focus:text-background focus:rounded-lg focus:text-sm focus:font-medium">Skip to main content</a>
    <!-- Pre-React CSS prevents FOUC -->
    <style>
      /* Prevent FOUC for screen-reader text before Tailwind loads */
      .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border-width:0}
      
      /* Base background to prevent white flash before Tailwind loads */
      body { background-color: #ffffff; }
      html.dark body { background-color: #000000; }
    </style>
  </div>
  <!-- Defer service worker cleanup — non-blocking -->
  <script>
    window.addEventListener('load', function() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(r) {
          r.forEach(function(sw) { sw.unregister(); });
        });
      }
    });
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>
